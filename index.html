<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สวัสดีครับ | ปัญญา</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter','Sarabun',sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 50px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      z-index: 999;
    }

    .nav-content {
      width: 100%;
      max-width: 1000px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    .menu a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 80px;
    }

    .hero h1 {
      font-size: 70px;
      font-weight: 700;
      background: linear-gradient(135deg,#a88beb,#7d97f4,#f1a7f1);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      margin-top: 15px;
      font-size: 20px;
      color: #6e6e73;
    }

    /* BUTTON */
    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary {
      background: #0071e3;
      color: white;
    }

    .btn-secondary {
      background: #e5e5ea;
    }

    .btn:hover {
      opacity: 0.8;
    }

    /* SECTION */
    .section {
      padding: 100px 20px;
      text-align: center;
    }

    .section h2 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .section p {
      color: #6e6e73;
      font-size: 18px;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-content">
    <div><b>MySite</b></div>
    <div class="menu">
      <a href="index.html">Home</a>
      <a href="about.html">CV</a>
      <a href="app.html">App</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>ผมชื่อปัญญา</h1>
    <p>นักพัฒนาเว็บไซต์ | Web Developer</p>

    <div class="buttons">
      <button class="btn btn-primary">ติดต่อฉัน</button>
      <button class="btn btn-secondary">ผลงาน</button>
    </div>
  </div>
</section>

<!-- SECTION -->
<section class="section">
  <h2>เกี่ยวกับฉัน</h2>
  <p>ผมสนใจด้านการพัฒนาเว็บไซต์ HTML CSS JavaScript และกำลังพัฒนาทักษะอย่างต่อเนื่อง</p>
</section>

</body>
</html>
