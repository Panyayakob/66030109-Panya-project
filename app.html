<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game | Panya</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Sarabun:wght@200;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background-color: #000;
            color: #fff;
            padding-top: 120px; /* เว้นที่ให้ Navbar และ Header */
        }

        /* --- NAVBAR: ต้องเหมือนหน้า Home เป๊ะๆ --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-content {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; color: #fff; text-decoration: none; }
        .menu { display: flex; gap: 30px; }
        .menu a {
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .menu a:hover { color: #fff; }

        /* --- GAME STYLES --- */
        .header-section { text-align: center; margin-bottom: 40px; }
        .gradient-title { font-size: 40px; font-weight: 300; margin-bottom: 10px; }
        .subtitle { font-size: 14px; text-transform: uppercase; letter-spacing: 5px; color: #666; }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 85px);
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .card {
            width: 85px; height: 85px; background: #1a1a1a;
            color: #fff; font-size: 32px; display: flex;
            align-items: center; justify-content: center;
            border-radius: 12px; cursor: pointer;
            transition: 0.4s; border: 1px solid rgba(255,255,255,0.1);
        }
        .card.flipped { background: #333; transform: rotateY(180deg); }
        .card.matched { background: rgba(255, 255, 255, 0.1); opacity: 0.5; border-color: #fff; }

        .btn-reset {
            display: block; margin: 0 auto;
            background: transparent; color: #fff;
            border: 1px solid #fff; padding: 12px 30px;
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-reset:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">PANYA</a>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="index.html#about">About</a>
                <a href="app.html">App</a>
                <a href="about.html">Full CV</a>
            </div>
        </div>
    </nav>
    <main>
        <section class="header-section">
            <h1 class="gradient-title">Memory Game</h1>
            <p class="subtitle">ฝึกสมองในสไตล์มินิมอล</p>
        </section>
        <div class="game-board" id="board"></div>
        <button class="btn-reset" onclick="initGame()">เริ่มเกมใหม่</button>
    </main>
    <script>
    const symbols = ["🍎","🍌","🍇","🍒","🍉","🍍","🥝","🍓"];
    let cards = []; 
    let firstCard = null; 
    let secondCard = null; 
    let lock = false;

    const board = document.getElementById("board");

    function initGame() {
        board.innerHTML = ""; 
        firstCard = null; 
        secondCard = null; 
        lock = false;
        
        // ผสมการ์ด 8 คู่ (16 ใบ)
        cards = [...symbols, ...symbols].sort(() => 0.5 - Math.random());
        
        cards.forEach(symbol => {
            const card = document.createElement("div");
            card.classList.add("card");
            card.dataset.symbol = symbol; // ✅ สำคัญ: เก็บค่าผลไม้ไว้ใน dataset
            card.innerText = "?";
            card.addEventListener("click", () => flipCard(card));
            board.appendChild(card);
        });
    }

    function flipCard(card) {
        // เงื่อนไขห้ามกด: ถ้าล็อคอยู่, กดใบเดิม, หรือใบนั้นถูกจับคู่ไปแล้ว
        if (lock || card === firstCard || card.classList.contains("matched")) return;

        const symbol = card.dataset.symbol;
        card.innerText = symbol; 
        card.classList.add("flipped");

        if (!firstCard) {
            firstCard = card;
            return;
        }

        secondCard = card;
        lock = true; // ล็อคบอร์ดชั่วคราวเพื่อรอตรวจ

        // ตรวจสอบว่ารูปตรงกันไหม
        if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
            // กรณี: จับคู่ถูก
            firstCard.classList.add("matched");
            secondCard.classList.add("matched");
            resetTurn();
        } else {
            // กรณี: จับคู่ผิด (รอ 0.6 วินาทีแล้วคว่ำคืน)
            setTimeout(() => {
                firstCard.innerText = "?";
                secondCard.innerText = "?";
                firstCard.classList.remove("flipped");
                secondCard.classList.remove("flipped");
                resetTurn();
            }, 600);
        }
    }

    function resetTurn() {
        firstCard = null;
        secondCard = null;
        lock = false;
    }

    initGame(); // เริ่มเกมทันทีที่โหลดหน้า
</script>
</body>
</html>
