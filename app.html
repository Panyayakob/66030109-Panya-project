<style>
    /* --- NEW GAME: ZOMBIE CLICKER --- */
    .game-container {
        max-width: 600px;
        margin: 20px auto;
        position: relative;
        background: #2c3e50; /* พื้นหลังมืดให้เข้ากับบรรยากาศซอมบี้ */
        height: 400px;
        border-radius: 20px;
        overflow: hidden;
        border: 4px solid #D81B60;
        cursor: crosshair;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .game-stats {
        display: flex;
        justify-content: space-around;
        padding: 10px;
        background: rgba(255, 255, 255, 0.9);
        font-weight: 700;
        color: #D81B60;
        border-bottom: 2px solid #FFB6C1;
    }

    .zombie {
        width: 60px;
        height: 60px;
        position: absolute;
        font-size: 50px;
        user-select: none;
        transition: transform 0.1s;
        cursor: pointer;
        filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
    }

    .zombie:active { transform: scale(0.8); }

    .hit-effect {
        position: absolute;
        color: #ff0000;
        font-weight: bold;
        pointer-events: none;
        animation: floatUp 0.5s ease-out forwards;
    }

    @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-50px); }
    }

    /* ปรับแต่งกติกาใหม่ */
    .rules-container li::before { content: '🧟'; }
</style>

<section class="header-section">
    <h1 class="gradient-title">Zombie Pink Hunter</h1>
    <p class="subtitle">กำจัดซอมบี้ที่บุกโลกสีชมพู!</p>

    <div class="rules-container">
        <h3>กติกาการเล่น</h3>
        <ul>
            <li>คลิกที่ตัวซอมบี้ 🧟 เพื่อกำจัดและรับคะแนน</li>
            <li>ระวัง! อย่าปล่อยให้ซอมบี้หายไปเอง คะแนนจะลด</li>
            <li>ทำคะแนนให้ได้มากที่สุดภายในเวลา 30 วินาที</li>
            <li>กดปุ่มด้านล่างเพื่อเริ่มล่าซอมบี้!</li>
        </ul>
    </div>
</section>

<div class="game-container" id="game-area">
    <div class="game-stats">
        <span>คะแนน: <span id="score">0</span></span>
        <span>เวลา: <span id="timer">30</span> วิ</span>
    </div>
    </div>

<button class="btn-reset" id="start-btn" onclick="startGame()">เริ่มล่าซอมบี้!</button>

<script>
    let score = 0;
    let timeLeft = 30;
    let gameActive = false;
    let spawnInterval;
    let countdownInterval;

    const gameArea = document.getElementById('game-area');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const startBtn = document.getElementById('start-btn');

    function startGame() {
        if (gameActive) return;
        
        // Reset stats
        score = 0;
        timeLeft = 30;
        gameActive = true;
        scoreElement.innerText = score;
        timerElement.innerText = timeLeft;
        startBtn.style.display = 'none';
        
        // Start Loops
        spawnInterval = setInterval(spawnZombie, 800);
        countdownInterval = setInterval(updateTimer, 1000);
    }

    function spawnZombie() {
        if (!gameActive) return;

        const zombie = document.createElement('div');
        zombie.className = 'zombie';
        zombie.innerText = '🧟';
        
        // สุ่มตำแหน่ง
        const maxX = gameArea.clientWidth - 60;
        const maxY = gameArea.clientHeight - 100;
        zombie.style.left = Math.random() * maxX + 'px';
        zombie.style.top = (Math.random() * maxY + 40) + 'px';

        zombie.onclick = (e) => {
            if (!gameActive) return;
            score += 10;
            scoreElement.innerText = score;
            createHitEffect(e.pageX, e.pageY);
            zombie.remove();
        };

        gameArea.appendChild(zombie);

        // ซอมบี้หายไปเองถ้าไม่กดภายใน 1.5 วิ
        setTimeout(() => {
            if (zombie.parentElement) {
                zombie.remove();
                if (gameActive) {
                    score = Math.max(0, score - 5);
                    scoreElement.innerText = score;
                }
            }
        }, 1500);
    }

    function createHitEffect(x, y) {
        const effect = document.createElement('div');
        effect.className = 'hit-effect';
        effect.innerText = '+10';
        effect.style.left = (x - 20) + 'px';
        effect.style.top = (y - 100) + 'px';
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 500);
    }

    function updateTimer() {
        timeLeft--;
        timerElement.innerText = timeLeft;
        if (timeLeft <= 0) endGame();
    }

    function endGame() {
        gameActive = false;
        clearInterval(spawnInterval);
        clearInterval(countdownInterval);
        
        // ล้างซอมบี้ที่ค้างอยู่
        const zombies = document.querySelectorAll('.zombie');
        zombies.forEach(z => z.remove());

        alert('จบเกม! คุณทำคะแนนได้: ' + score + ' คะแนน');
        startBtn.style.display = 'block';
        startBtn.innerText = 'เล่นอีกครั้ง';
    }
</script>
