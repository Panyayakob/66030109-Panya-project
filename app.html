<!DOCTYPE html>
<!-- กำหนดว่าเป็น HTML5 -->
<html lang="th">
<!-- ระบุภาษาเป็นภาษาไทย -->
<head>
    <meta charset="UTF-8">
    <!-- รองรับภาษาไทย -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ทำให้ responsive + ป้องกันการซูมบนมือถือ -->

    <title>Zombie Hunter | Panya Pink Edition</title>
    <!-- ชื่อแท็บ -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <!-- โหลดฟอนต์ -->

    <style>
        /* --- 1. BASE STYLES --- */

        :root {
            /* ตัวแปรสีหลัก */
            --primary-pink: #D81B60;
            --soft-pink: #FFF0F5;
            --accent-pink: #FFB6C1;
            --dark-text: #D81B60;
            --game-bg: #232d37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* reset CSS */

        html { scroll-behavior: smooth; }
        /* scroll แบบลื่น */

        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
            background: var(--soft-pink);
            color: var(--dark-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            /* ป้องกัน scroll แนวนอน */
        }

        /* --- 2. NAVIGATION --- */

        .navbar {
            position: fixed;
            /* เมนูติดบน */

            top: 0; width: 100%; height: 60px;

            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            /* effect เบลอ */

            display: flex; justify-content: center;
            z-index: 1000;

            border-bottom: 1px solid rgba(216, 27, 96, 0.1);
        }

        .nav-content {
            width: 100%; max-width: 1200px;
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 15px;
        }

        .logo {
            font-size: 1.1rem; font-weight: 700;
            text-decoration: none; color: var(--primary-pink);
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        .menu { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            /* เลื่อนแนวนอนได้บนมือถือ */

            white-space: nowrap;
            padding: 5px 0;
            -webkit-overflow-scrolling: touch;
        }

        .menu::-webkit-scrollbar { display: none; }
        /* ซ่อน scrollbar */

        .menu a {
            text-decoration: none; color: var(--dark-text);
            font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; transition: 0.3s;
        }

        .menu a:hover { color: var(--primary-pink); }
        /* hover เปลี่ยนสี */

        /* --- 3. HEADER SECTION --- */

        .header-section { 
            padding: 90px 20px 40px; 
            text-align: center; 
            background: linear-gradient(135deg, var(--primary-pink) 0%, #AD1457 100%);
            color: #fff;
        }

        .header-section h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            /* responsive font */

            line-height: 1.2; margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 0.8rem; letter-spacing: 3px;
            color: var(--accent-pink); text-transform: uppercase;
        }

        /* --- 4. RULES --- */

        .game-wrapper { max-width: 900px; margin: -25px auto 40px; padding: 0 15px; }

        .rules-container {
            background: #fff; padding: 20px;
            border-radius: 20px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.1);
            border-left: 5px solid var(--primary-pink);
        }

        .rules-container h3 { color: var(--primary-pink); }

        .rules-container li::before { content: '🌸'; }
        /* ใส่ icon หน้า list */

        /* --- 5. GAME AREA --- */

        .game-container {
            position: relative;
            background: var(--game-bg);
            height: 60vh;
            min-height: 380px;

            border-radius: 25px;
            overflow: hidden;

            border: 6px solid #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);

            touch-action: manipulation;
            /* ป้องกัน zoom ตอนกด */
        }

        .game-stats {
            display: flex; justify-content: space-around;
            padding: 12px; background: #fff;
            font-weight: 700;
        }

        .zombie {
            width: 65px; height: 65px;
            position: absolute;
            font-size: 45px;

            cursor: pointer;
        }

        .hit-effect {
            position: absolute;
            animation: floatUp 0.6s ease-out forwards;
            /* animation ตอนตีโดน */
        }

        @keyframes floatUp {
            0% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-80px); }
        }

        /* --- 6. BUTTON --- */

        .btn-start {
            display: block; margin: 25px auto;
            background: var(--primary-pink);
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
        }

        footer {
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- เมนูด้านบน -->
    <header>
        <nav class="navbar">
            <div class="nav-content">
                <a href="index.html" class="logo">PANYA</a>
                <div class="menu">
                    <a href="index.html">Home</a>
                    <a href="index.html#about">About</a> 
                    <a href="app.html">App</a>
                    <a href="about.html">Full CV</a>
                </div>
            </div>
        </nav>
    </header>

    <main>

        <!-- หัวข้อเกม -->
        <section class="header-section">
            <p class="subtitle">Mini Game Challenge</p>
            <h1>Zombie Pink Hunter</h1>
        </section>

        <div class="game-wrapper">

            <!-- กติกา -->
            <div class="rules-container">
                <h3>กติกาการเล่น</h3>
                <ul>
                    <li>แตะซอมบี้ 🧟 เพื่อกำจัด (+10 คะแนน)</li>
                    <li>หากปล่อยหลุดไป (-5 คะแนน)</li>
                    <li>เวลาจำกัด 30 วินาที</li>
                </ul>
            </div>

            <!-- พื้นที่เกม -->
            <div class="game-container" id="game-area">

                <!-- คะแนน + เวลา -->
                <div class="game-stats">
                    <div>SCORE: <span id="score">0</span></div>
                    <div>TIME: <span id="timer">30</span>s</div>
                </div>
            </div>

            <!-- ปุ่มเริ่มเกม -->
            <button class="btn-start" id="start-btn" onclick="startGame()">เริ่มกำจัดซอมบี้!</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Panya Portfolio.</p>
    </footer>

    <script>
        // ตัวแปรเกม
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;

        let spawnInterval, countdownInterval;

        // ดึง element จาก DOM
        const gameArea = document.getElementById('game-area');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const startBtn = document.getElementById('start-btn');

        // เริ่มเกม
        function startGame() {
            if (gameActive) return;

            score = 0;
            timeLeft = 30;
            gameActive = true;

            scoreElement.innerText = score;
            timerElement.innerText = timeLeft;

            startBtn.style.visibility = 'hidden';

            // สร้างซอมบี้ทุก 0.75 วิ
            spawnInterval = setInterval(spawnZombie, 750);

            // นับเวลาทุก 1 วิ
            countdownInterval = setInterval(updateTimer, 1000);
        }

        // สร้างซอมบี้
        function spawnZombie() {
            if (!gameActive) return;

            const zombie = document.createElement('div');
            zombie.className = 'zombie';
            zombie.innerText = '🧟';

            // สุ่มตำแหน่ง
            const maxX = gameArea.clientWidth - 70;
            const maxY = gameArea.clientHeight - 120;

            zombie.style.left = Math.random() * maxX + 'px';
            zombie.style.top = (Math.random() * maxY + 60) + 'px';

            // เมื่อกดซอมบี้
            const handleAction = (e) => {
                if (!gameActive) return;

                score += 10;
                scoreElement.innerText = score;

                createHitEffect(e.clientX, e.clientY);
                zombie.remove();
            };

            zombie.addEventListener('pointerdown', handleAction);

            gameArea.appendChild(zombie);

            // ถ้าไม่กดภายในเวลา จะลบ + หักคะแนน
            setTimeout(() => {
                if (zombie.parentElement) {
                    zombie.remove();
                    score = Math.max(0, score - 5);
                    scoreElement.innerText = score;
                }
            }, 1100);
        }

        // เอฟเฟกต์ +10
        function createHitEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.innerText = '+10';

            effect.style.left = x + 'px';
            effect.style.top = y + 'px';

            document.body.appendChild(effect);

            setTimeout(() => effect.remove(), 600);
        }

        // นับเวลา
        function updateTimer() {
            timeLeft--;
            timerElement.innerText = timeLeft;

            if (timeLeft <= 0) endGame();
        }

        // จบเกม
        function endGame() {
            gameActive = false;

            clearInterval(spawnInterval);
            clearInterval(countdownInterval);

            document.querySelectorAll('.zombie').forEach(z => z.remove());

            alert('จบเกม คะแนน: ' + score);

            startBtn.style.visibility = 'visible';
        }
    </script>
</body>
</html>
