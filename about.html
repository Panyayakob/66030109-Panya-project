<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV | Panya - Apple Style</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* 1. RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Sarabun', -apple-system, sans-serif;
            background-color: #f5f5f7; /* สีเทาอ่อนแบบ Apple */
            color: #1d1d1f;
            line-height: 1.6;
            padding-top: 80px;
        }

        /* 2. NAVBAR (แบบที่คุณชอบ) */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 48px;
            background: rgba(251, 251, 253, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-content {
            width: 100%;
            max-width: 1024px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 22px;
        }

        .logo { font-weight: 600; font-size: 19px; }

        .menu { display: flex; gap: 30px; }
        .menu a { 
            text-decoration: none; 
            color: #1d1d1f; 
            font-size: 12px; 
            opacity: 0.8; 
            transition: 0.3s;
        }
        .menu a:hover { opacity: 0.5; }

        /* 3. CV CONTENT */
        .cv-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .profile-header h1 {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .gradient-name {
            background: linear-gradient(135deg, #a88beb 0%, #7d97f4 50%, #f1a7f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CV Card Style */
        .cv-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }

        .cv-card:hover {
            transform: translateY(-5px);
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #86868b;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .info-text {
            font-size: 20px;
            font-weight: 500;
            color: #1d1d1f;
        }

        /* Skill Badges */
        .skills-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .skill-tag {
            background: #f5f5f7;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
        }

        /* Footer Link */
        .back-home {
            display: block;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 60px;
            color: #0066cc;
            font-size: 17px;
            text-decoration: none;
        }

        .back-home:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">MySite</div>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="about.html">CV</a>
                <a href="app.html">App</a>
            </div>
        </div>
    </nav>

    <main class="cv-container">
        
        <header class="profile-header">
            <h1>Curriculum <span class="gradient-name">Vitae</span></h1>
            <p style="color: #86868b; font-size: 19px;">ประวัติส่วนตัวและทักษะการทำงาน</p>
        </header>

        <div class="cv-card">
            <p class="section-title">ชื่อ-นามสกุล</p>
            <p class="info-text">Panya (ปัญญา)</p>
        </div>

        <div class="cv-card">
            <p class="section-title">การศึกษา</p>
            <p class="info-text">ปริญญาตรี คณะวิทยาศาสตร์คอมพิวเตอร์</p>
            <p style="color: #86868b;">มหาวิทยาลัยเทคโนโลยีแห่งประเทศไทย (2020 - ปัจจุบัน)</p>
        </div>

        <div class="cv-card">
            <p class="section-title">ทักษะและความสามารถ (Skills)</p>
            <div class="skills-group">
                <span class="skill-tag">HTML5</span>
                <span class="skill-tag">CSS3</span>
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">UI/UX Design</span>
                <span class="skill-tag">Responsive Web</span>
            </div>
        </div>

        <a href="index.html" class="back-home">< กลับหน้าแรก</a>

    </main>

</body>
</html>
